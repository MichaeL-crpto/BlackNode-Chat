spring.application.name=demo
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/chatdb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Please change this to a secure, unique value in production
app.security.jwt.secret=${JWT_SECRET:ThisIsAVerySecureSecretKeyForJWTTokenGeneration2024BlackNodeChat}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.security.auth.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS:5}
app.security.auth.lock-duration-minutes=${AUTH_LOCK_DURATION_MINUTES:15}
